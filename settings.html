<!doctype html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<meta charset="utf-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter, sans-serif;
  color:white;
  background:transparent;

  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:420px;
  padding:20px;
}

h2{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
}

.section{
  margin-bottom:16px;
  padding:16px;
  border-radius:14px;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);
}

.label{
  font-size:14px;
  opacity:.8;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.06);
  color:white;
  outline:none;
}

input::placeholder{
  color:rgba(255,255,255,0.4);
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:rgba(255,255,255,0.18);
}

.toggle-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:14px;
}

.switch{
  position:relative;
  width:46px;
  height:26px;
}

.switch input{
  opacity:0;
  width:0;
  height:0;
}

.slider{
  position:absolute;
  cursor:pointer;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(255,255,255,0.2);
  border-radius:30px;
  transition:.25s;
}

.slider:before{
  position:absolute;
  content:"";
  height:20px;
  width:20px;
  left:3px;
  top:3px;
  background:white;
  border-radius:50%;
  transition:.25s;
}

input:checked + .slider{
  background:#363737;
}

input:checked + .slider:before{
  transform:translateX(20px);
}
</style>
</head>

<body>

<div class="container">

<h2>Settings</h2>

<div class="section">
<div class="label">Title</div>
<input id="title" placeholder="Google">
<button onclick="saveTitle()">Apply</button>
</div>

<div class="section">
<div class="label">Favicon</div>
<input id="favicon" placeholder="https://google.com/favicon.ico">
<button onclick="saveFavicon()">Apply</button>
</div>

<div class="section">

<button onclick="openBlank()">Open in about:blank</button>

<div class="toggle-row">
<span>Leave Site query</span>

<label class="switch">
  <input type="checkbox" id="leaveToggle">
  <span class="slider"></span>
</label>

</div>
</div>

</div>

<script>
const leave = localStorage.getItem("z_leave");
if(leave === "true"){
  document.getElementById("leaveToggle").checked = true;
  window.onbeforeunload = () => true;
}

function saveTitle(){
  const val = document.getElementById("title").value.trim();
  if(val) localStorage.setItem("z_title", val);
}

function saveFavicon(){
  let val = document.getElementById("favicon").value.trim();
  if(!val) return;

  let url = val.startsWith("http")
    ? val
    : "https://favicon.nextdns.io/" + val;

  localStorage.setItem("z_icon", url);
}

function openBlank(){
  const url = location.origin;

  const win = window.open("about:blank", "_blank");
  win.document.write(`
    <iframe src="${url}" style="border:none;width:100vw;height:100vh;"></iframe>
  `);
}

document.getElementById("leaveToggle").onchange = e => {
  if(e.target.checked){
    localStorage.setItem("z_leave","true");
    window.onbeforeunload = () => true;
  } else {
    localStorage.setItem("z_leave","false");
    window.onbeforeunload = null;
  }
};
</script>

</body>
</html>
